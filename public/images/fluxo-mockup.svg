<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0518"/>
      <stop offset="50%" style="stop-color:#1a0b2e"/>
      <stop offset="100%" style="stop-color:#0f0518"/>
    </linearGradient>
    
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a0b2e;stop-opacity:0.8"/>
    </linearGradient>
    
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:0.8"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Decorative Orbs -->
  <circle cx="150" cy="200" r="300" fill="#9333ea" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1050" cy="600" r="350" fill="#a855f7" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Main Dashboard Container -->
  <rect x="80" y="80" width="1040" height="640" rx="16" fill="#1a0b2e" filter="url(#shadow)"/>
  
  <!-- Header Bar -->
  <rect x="80" y="80" width="1040" height="70" rx="16" fill="#2d1b4e"/>
  <rect x="80" y="130" width="1040" height="20" fill="#2d1b4e"/>
  
  <!-- Window Controls -->
  <circle cx="115" cy="115" r="10" fill="#ef4444"/>
  <circle cx="145" cy="115" r="10" fill="#f59e0b"/>
  <circle cx="175" cy="115" r="10" fill="#22c55e"/>
  
  <!-- Logo/Brand -->
  <text x="550" y="125" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#purpleGradient)" text-anchor="middle">FLUXO</text>
  <text x="620" y="125" font-family="Arial, sans-serif" font-size="12" fill="#a855f7" text-anchor="start">ERP</text>
  
  <!-- Sidebar -->
  <rect x="80" y="150" width="200" height="570" fill="#0f0518" opacity="0.5"/>
  
  <!-- Sidebar Menu Items -->
  <rect x="100" y="180" width="160" height="40" rx="8" fill="#9333ea" opacity="0.3"/>
  <text x="115" y="205" font-family="Arial, sans-serif" font-size="13" fill="#c084fc">Dashboard</text>
  
  <rect x="100" y="240" width="160" height="40" rx="8" fill="transparent"/>
  <text x="115" y="265" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Vendas</text>
  
  <rect x="100" y="300" width="160" height="40" rx="8" fill="transparent"/>
  <text x="115" y="325" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Estoque</text>
  
  <rect x="100" y="360" width="160" height="40" rx="8" fill="transparent"/>
  <text x="115" y="385" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Clientes</text>
  
  <rect x="100" y="420" width="160" height="40" rx="8" fill="transparent"/>
  <text x="115" y="445" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Financeiro</text>
  
  <rect x="100" y="480" width="160" height="40" rx="8" fill="transparent"/>
  <text x="115" y="505" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Relatórios</text>
  
  <!-- Main Content Area -->
  <!-- Stats Cards Row -->
  <rect x="300" y="180" width="280" height="120" rx="12" fill="url(#cardGradient)"/>
  <text x="320" y="210" font-family="Arial, sans-serif" font-size="12" fill="#a855f7">Vendas Hoje</text>
  <text x="320" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">R$ 12.450</text>
  <text x="320" y="280" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">↑ 15.3%</text>
  
  <rect x="600" y="180" width="280" height="120" rx="12" fill="url(#cardGradient)"/>
  <text x="620" y="210" font-family="Arial, sans-serif" font-size="12" fill="#a855f7">Pedidos</text>
  <text x="620" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff">47</text>
  <text x="620" y="280" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">↑ 8.2%</text>
  
  <rect x="900" y="180" width="200" height="120" rx="12" fill="url(#cardGradient)"/>
  <text x="920" y="210" font-family="Arial, sans-serif" font-size="12" fill="#a855f7">Estoque Baixo</text>
  <text x="920" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ef4444">12</text>
  <text x="920" y="280" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">Atenção</text>
  
  <!-- Chart Area -->
  <rect x="300" y="320" width="520" height="250" rx="12" fill="url(#cardGradient)"/>
  <text x="320" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Faturamento Mensal</text>
  
  <!-- Chart Line -->
  <path d="M 320 530 L 380 500 L 440 520 L 500 480 L 560 490 L 620 450 L 680 470 L 740 420 L 800 440" 
        stroke="url(#purpleGradient)" stroke-width="3" fill="none"/>
  
  <!-- Chart Area Fill -->
  <path d="M 320 530 L 380 500 L 440 520 L 500 480 L 560 490 L 620 450 L 680 470 L 740 420 L 800 440 L 800 560 L 320 560 Z" 
        fill="url(#chartGradient)"/>
  
  <!-- Chart Grid Lines -->
  <line x1="320" y1="560" x2="800" y2="560" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="320" y1="510" x2="800" y2="510" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="320" y1="460" x2="800" y2="460" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="320" y1="410" x2="800" y2="410" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Recent Orders Table -->
  <rect x="840" y="320" width="260" height="250" rx="12" fill="url(#cardGradient)"/>
  <text x="860" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Pedidos Recentes</text>
  
  <!-- Table Rows -->
  <rect x="860" y="370" width="220" height="30" rx="6" fill="#9333ea" opacity="0.2"/>
  <text x="870" y="390" font-family="Arial, sans-serif" font-size="11" fill="#c084fc">#1234</text>
  <text x="980" y="390" font-family="Arial, sans-serif" font-size="11" fill="#fff">R$ 450</text>
  
  <rect x="860" y="410" width="220" height="30" rx="6" fill="transparent"/>
  <text x="870" y="430" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">#1233</text>
  <text x="980" y="430" font-family="Arial, sans-serif" font-size="11" fill="#fff">R$ 890</text>
  
  <rect x="860" y="450" width="220" height="30" rx="6" fill="transparent"/>
  <text x="870" y="470" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">#1232</text>
  <text x="980" y="470" font-family="Arial, sans-serif" font-size="11" fill="#fff">R$ 320</text>
  
  <rect x="860" y="490" width="220" height="30" rx="6" fill="transparent"/>
  <text x="870" y="510" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">#1231</text>
  <text x="980" y="510" font-family="Arial, sans-serif" font-size="11" fill="#fff">R$ 670</text>
  
  <rect x="860" y="530" width="220" height="30" rx="6" fill="transparent"/>
  <text x="870" y="550" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">#1230</text>
  <text x="980" y="550" font-family="Arial, sans-serif" font-size="11" fill="#fff">R$ 210</text>
  
  <!-- Bottom Section -->
  <rect x="300" y="590" width="520" height="110" rx="12" fill="url(#cardGradient)"/>
  <text x="320" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Alertas de Estoque</text>
  
  <!-- Alert Items -->
  <rect x="320" y="635" width="480" height="25" rx="6" fill="#ef4444" opacity="0.2"/>
  <text x="330" y="652" font-family="Arial, sans-serif" font-size="11" fill="#fff">Produto A - 3 unidades</text>
  
  <rect x="320" y="665" width="480" height="25" rx="6" fill="#f59e0b" opacity="0.2"/>
  <text x="330" y="682" font-family="Arial, sans-serif" font-size="11" fill="#fff">Produto B - 8 unidades</text>
  
  <!-- Right Bottom Card -->
  <rect x="840" y="590" width="260" height="110" rx="12" fill="url(#cardGradient)"/>
  <text x="860" y="620" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Métricas</text>
  <text x="860" y="650" font-family="Arial, sans-serif" font-size="11" fill="#a855f7">Ticket Médio</text>
  <text x="860" y="670" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff">R$ 265</text>
  <text x="860" y="690" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">↑ 12.5%</text>
</svg>
